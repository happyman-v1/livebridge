name: livebridge
description: "Bridge regular Android notifications into Live Updates."
publish_to: "none"
version: 2.1.4+66

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Use the v12 beta of flutter_file_picker which includes migration to built-in Kotlin
  # This avoids plugins applying the Kotlin Gradle Plugin and resolves AGP 9+/Flutter build failures.
  file_picker:
    git:
      url: https://github.com/miguelpruivo/flutter_file_picker.git
      ref: v12.0.0-beta.4
  url_launcher: ^6.3.2
  ming_cute_icons: ^0.0.7

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/icon-master.png
  fonts:
    - family: SfProRounded
      fonts:
        - asset: assets/fonts/SF-Compact-Rounded-Medium.otf
          weight: 500
