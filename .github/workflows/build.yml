name: Flutter Automated Build & Safe Migration

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java Environment
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Flutter Environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      # 4. Smart Auto-Migration Step (Prevents Gradle Syntax Corruption)
      - name: Smart Auto-Migrate Kotlin & Gradle Configurations
        shell: python
        run: |
          import os
          import re

          print("--- Starting Smart Gradle & Kotlin Migration ---")

          # 1. Clean root android/build.gradle safely
          bg_path = 'android/build.gradle'
          if os.path.exists(bg_path):
              print(f"Processing {bg_path}...")
              with open(bg_path, 'r') as f:
                  content = f.read()
              
              # Comment out old legacy kotlin configurations instead of deleting them completely
              content = re.sub(r'(ext\.kotlin_version\s*=\s*[\'\"][^\'\"]+[\'\"])', r'// \1 # Disabled by CI', content)
              content = re.sub(r'(classpath\s+[\'\"]org\.jetbrains\.kotlin:kotlin-gradle-plugin:[^\'\"]+[\'\"])', r'// \1 # Disabled by CI', content)
              
              with open(bg_path, 'w') as f:
                  f.write(content)

          # 2. Safely add pluginManagement to android/settings.gradle if missing
          sg_path = 'android/settings.gradle'
          if os.path.exists(sg_path):
              print(f"Processing {sg_path}...")
              with open(sg_path, 'r') as f:
                  content = f.read()
              
              if 'pluginManagement' not in content:
                  plugin_management_block = """pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
              plugins {
                  id "org.jetbrains.kotlin.android" version "1.9.10"
              }
          }
          """
                  content = plugin_management_block + content
                  print("Injected compliant pluginManagement block successfully.")
              
              with open(sg_path, 'w') as f:
                  f.write(content)

          # 3. Align app-level android/app/build.gradle with the modern plugin structure
          app_bg_path = 'android/app/build.gradle'
          if os.path.exists(app_bg_path):
              print(f"Processing {app_bg_path}...")
              with open(app_bg_path, 'r') as f:
                  content = f.read()
              
              # Upgrade deprecated 'kotlin-android' names to standard 'org.jetbrains.kotlin.android'
              content = content.replace("apply plugin: 'kotlin-android'", "apply plugin: 'org.jetbrains.kotlin.android'")
              content = content.replace('apply plugin: "kotlin-android"', 'apply plugin: "org.jetbrains.kotlin.android"')
              content = content.replace("id 'kotlin-android'", "id 'org.jetbrains.kotlin.android'")
              content = content.replace('id "kotlin-android"', 'id "org.jetbrains.kotlin.android"')

              with open(app_bg_path, 'w') as f:
                  f.write(content)

          print("--- Smart Migration Completed Safely ---")

      # 5. Clean and fetch packages
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # 6. Build the production APK release securely
      - name: Build APK Release
        run: flutter build apk --release
