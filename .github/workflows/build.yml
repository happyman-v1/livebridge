name: Flutter Auto-Fix & Build Release

on:
  push:
    branches:
      - main # أو اسم الفرع الرئيسي لديك (مثلاً master)
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد إصدار جافا المطلوب لبناء أندرويد
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4' # الإصدار الحالي لمشروعك
          channel: 'stable'

      # 4. 🔥 السحر هنا: تعديل وتنظيف ملفات الـ Gradle تلقائياً قبل البناء
      - name: Auto-Fix Deprecated Kotlin Plugin
        run: |
          echo "=== Starting Automatic Kotlin Migration ==="
          
          # تنظيف ملف android/build.gradle من اعتمادات الكوتلن القديمة
          if [ -f android/build.gradle ]; then
            sed -i '/org.jetbrains.kotlin.android/d' android/build.gradle
            sed -i '/kotlin-gradle-plugin/d' android/build.gradle
          fi
          
          # تنظيف ملف android/app/build.gradle من استدعاء الإضافات الملغاة
          if [ -f android/app/build.gradle ]; then
            sed -i '/kotlin-android/d' android/app/build.gradle
            sed -i '/org.jetbrains.kotlin.android/d' android/app/build.gradle
          fi
          
          # تنظيف ملف settings.gradle إذا كانت الإضافة معرفة هناك
          if [ -f android/settings.gradle ]; then
            sed -i '/org.jetbrains.kotlin.android/d' android/settings.gradle
          fi
          
          echo "=== Auto-Fix Completed Successfully ==="

      # 5. تحميل حزم الاعتمادات (Dependencies)
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # 6. بناء ملف الـ APK بأمان بعد التعديل الأوتوماتيكي
      - name: Build APK Release
        run: flutter build apk --release
