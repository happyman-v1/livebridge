name: Flutter Automated Build & Safe Migration

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود الحالي من الـ Repository كما هو بدون تعديل
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. تهيئة بيئة الجافا
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تهيئة بيئة فلاتر بالإصدار المطلوب
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      # 4. تنظيف الكاش وجلب حزم الملحقات (بأمان)
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # 5. بناء نسخة الـ APK الرسمية اعتماداً على ملفاتك الأصلية
      - name: Build APK Release
        run: flutter build apk --release
